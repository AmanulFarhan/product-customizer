<!DOCTYPE html>
<html>
<head>
    <title>Product Customizer</title>

    <!-- ✅ IMPORTANT for responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input, select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .results {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            text-align: center;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        img {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
        }

        .download {
            text-align: center;
            margin-top: 20px;
        }

        .download button {
            background: #2196F3;
        }

        .download button:hover {
            background: #1976D2;
        }

        /* 🔥 RESPONSIVE FIX */
        @media (max-width: 768px) {

            .container {
                margin: 10px;
                padding: 15px;
            }

            .results {
                flex-direction: column;
                align-items: center;
            }

            img {
                max-width: 100%;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Product Customizer</h1>
    <p>Upload your design and preview it on products in real-time</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Upload Design:</label>
        <input type="file" name="design" required>

        <label>Select Product:</label>
        <select name="product" required>
            <option value="">-- Select Product --</option>
            <option value="white_tshirt">White T-Shirt</option>
            <option value="hoodie">Hoodie</option>
            <option value="cap">Cap</option>
        </select>

        <button type="submit">Customize</button>
    </form>

    {% if output_image %}
        <div class="results">
            <div class="card">
                <h3>Original</h3>
                <img src="/media/products/{{ product }}.png">
            </div>

            <div class="card">
                <h3>Customized</h3>
                <img src="{{ output_image }}">
            </div>
        </div>

        <div class="download">
            <a href="{{ output_image }}" download>
                <button>Download Result</button>
            </a>
        </div>
    {% endif %}
</div>

</body>
</html>
